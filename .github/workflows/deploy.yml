name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build static site
        run: npm run build
        env:
          NITRO_PRESET: github_pages
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: List output directory
        run: ls -la .output/ || ls -la dist/ || echo "Checking build output..."

      - name: Add 404.html for SPA routing
        run: |
          if [ -d ".output/public" ]; then
            cp .output/public/index.html .output/public/404.html
            echo "Using .output/public"
          elif [ -d "dist/client" ]; then
            cp dist/client/index.html dist/client/404.html
            echo "Using dist/client"
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ hashFiles('.output/public/index.html') != '' && '.output/public' || 'dist/client' }}

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
